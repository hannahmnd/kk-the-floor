<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FLOOR</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>THE FLOOR</h1>
  <div class="setup-field">
    <label>MÄNGIJA 1</label>
    <input type="text" id="name1" value="MARI">
  </div>
  <div class="setup-field">
    <label>MÄNGIJA 2</label>
    <input type="text" id="name2" value="MATI">
  </div>
  <div class="setup-field">
    <label>AEG (SEKUNDITES)</label>
    <input type="number" id="timeInput" value="60" min="5" max="600">
  </div>
  <label style="font-size:1.1rem;">ALUSTAB</label>
  <div class="player-select">
    <button class="player-card selected" id="sel1" onclick="selectFirst(0)">MARI</button>
    <button class="player-card" id="sel2" onclick="selectFirst(1)">MATI</button>
  </div>
  <div class="legend">
    <div>MÄNGIJA 1: F = ÕIGE, S = VAHELE</div>
    <div>MÄNGIJA 2: J = ÕIGE, L = VAHELE</div>
    <div>SPACE = START/STOP | N = UUS MÄNG</div>
    <div>B = TAGASI | SHIFT+F = TÄISEKRAAN</div>
  </div>
  <button id="startGameBtn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <h1>THE FLOOR</h1>
  <div class="players-row">
    <div class="player-col">
      <div class="player-name" id="gName1"></div>
      <div class="timer-box inactive" id="tBox1"><span id="tDisp1">60</span></div>
    </div>
    <div class="player-col">
      <div class="player-name" id="gName2"></div>
      <div class="timer-box inactive" id="tBox2"><span id="tDisp2">60</span></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="overlayMsg"></div>
  <div id="overlayHint">N = UUS MÄNG</div>
</div>

<script src="script.js"></script>
</body>
</html>
